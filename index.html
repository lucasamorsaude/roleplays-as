<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmorSaúde SJDR — Roleplays & Personas</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f1419;
    --bg-elev: #1a2129;
    --bg-elev-2: #232c36;
    --border: #2d3744;
    --text: #e6edf3;
    --text-dim: #8b98a8;
    --accent: #00b894;
    --accent-2: #0984e3;
    --accent-warn: #fdcb6e;
    --danger: #e17055;
    --radius: 10px;
    --shadow: 0 4px 12px rgba(0,0,0,.25);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }
  header {
    padding: 16px 24px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
  }
  header h1 .accent { color: var(--accent); }
  header .sub {
    color: var(--text-dim);
    font-size: 12px;
  }
  main {
    display: grid;
    grid-template-columns: 280px 320px 1fr;
    gap: 16px;
    padding: 16px;
    height: calc(100vh - 60px);
    overflow: hidden;
  }
  .col {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .col-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .12s ease, border-color .12s ease;
    border: 1px solid transparent;
    margin-bottom: 4px;
  }
  .item:hover { background: var(--bg-elev-2); }
  .item.selected {
    background: rgba(0,184,148,.12);
    border-color: var(--accent);
  }
  .item .title {
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .item .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .category {
    padding: 8px 12px 4px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-dim);
    font-weight: 600;
    margin-top: 8px;
  }
  .category:first-child { margin-top: 0; }
  .preview-toolbar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .preview-toolbar .status {
    flex: 1;
    font-size: 12px;
    color: var(--text-dim);
  }
  .tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all .12s;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background .12s, transform .08s;
  }
  .btn:hover { background: #00a383; }
  .btn:active { transform: scale(.97); }
  .btn:disabled {
    background: var(--bg-elev-2);
    color: var(--text-dim);
    cursor: not-allowed;
  }
  .btn.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn.secondary:hover { background: var(--bg-elev-2); }
  .preview-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    font-size: 14px;
  }
  .preview-body.raw {
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 12.5px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .preview-body h1, .preview-body h2, .preview-body h3 {
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    margin-top: 24px;
  }
  .preview-body h1:first-child { margin-top: 0; }
  .preview-body code {
    background: var(--bg-elev-2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12.5px;
  }
  .preview-body pre {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
  }
  .preview-body pre code {
    background: transparent;
    padding: 0;
  }
  .preview-body table {
    border-collapse: collapse;
    margin: 12px 0;
    width: 100%;
  }
  .preview-body th, .preview-body td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
  }
  .preview-body th { background: var(--bg-elev-2); }
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 48px 24px;
    font-size: 13px;
  }
  .empty .icon { font-size: 32px; margin-bottom: 8px; }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    box-shadow: var(--shadow);
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--bg-elev-2); }
  /* Responsive */
  @media (max-width: 900px) {
    main {
      grid-template-columns: 1fr;
      height: auto;
      overflow: visible;
    }
    .col { max-height: 60vh; }
  }
</style>
</head>
<body>

<header>
  <h1>🎭 AmorSaúde SJDR — <span class="accent">Roleplays &amp; Personas</span></h1>
  <div class="sub">Combine uma persona com um roleplay e copie o prompt pronto</div>
</header>

<main>
  <section class="col">
    <div class="col-header"><span>👥 Personas</span><span id="persona-count"></span></div>
    <div class="col-body" id="personas-list"></div>
  </section>

  <section class="col">
    <div class="col-header"><span>🎬 Roleplays</span><span id="roleplay-count"></span></div>
    <div class="col-body" id="roleplays-list"></div>
  </section>

  <section class="col">
    <div class="preview-toolbar">
      <button class="tab active" data-view="prompt" id="tab-prompt">Prompt Final</button>
      <button class="tab" data-view="persona" id="tab-persona">Persona</button>
      <button class="tab" data-view="roleplay" id="tab-roleplay">Roleplay</button>
      <div class="status" id="status"></div>
      <button class="btn secondary" id="btn-toggle-render" title="Alternar entre texto cru e renderizado">📄 Cru</button>
      <button class="btn" id="btn-copy" disabled>📋 Copiar</button>
    </div>
    <div class="preview-body" id="preview">
      <div class="empty">
        <div class="icon">👈</div>
        <div>Selecione uma <strong>persona</strong> e um <strong>roleplay</strong> para gerar o prompt.</div>
      </div>
    </div>
  </section>
</main>

<div class="toast" id="toast">Copiado!</div>

<script>
const state = {
  manifest: null,
  selectedPersona: null,
  selectedRoleplay: null,
  personaContent: '',
  roleplayContent: '',
  view: 'prompt',
  renderMode: 'rendered' // 'rendered' | 'raw'
};

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

async function loadManifest() {
  const res = await fetch('manifest.json');
  if (!res.ok) throw new Error('Falha ao carregar manifest.json');
  state.manifest = await res.json();
}

async function loadMarkdown(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error('Falha ao carregar ' + path);
  return await res.text();
}

function renderPersonasList() {
  const list = $('#personas-list');
  list.innerHTML = '';
  state.manifest.personas.forEach((p, idx) => {
    const el = document.createElement('div');
    el.className = 'item';
    el.dataset.file = p.file;
    el.innerHTML = `
      <div class="title">${p.emoji} ${p.name}</div>
      <div class="subtitle">${p.age} anos · ${p.role}</div>
    `;
    el.addEventListener('click', () => selectPersona(p, el));
    list.appendChild(el);
  });
  $('#persona-count').textContent = `${state.manifest.personas.length} disponíveis`;
}

function renderRoleplaysList() {
  const list = $('#roleplays-list');
  list.innerHTML = '';
  let total = 0;
  state.manifest.roleplays.forEach(cat => {
    const catEl = document.createElement('div');
    catEl.className = 'category';
    catEl.textContent = `${cat.emoji} ${cat.category}`;
    list.appendChild(catEl);
    cat.items.forEach(r => {
      total++;
      const el = document.createElement('div');
      el.className = 'item';
      el.dataset.file = r.file;
      el.innerHTML = `<div class="title">${r.name}</div>`;
      el.addEventListener('click', () => selectRoleplay(r, el));
      list.appendChild(el);
    });
  });
  $('#roleplay-count').textContent = `${total} disponíveis`;
}

async function selectPersona(persona, el) {
  $$('#personas-list .item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  state.selectedPersona = persona;
  try {
    state.personaContent = await loadMarkdown(persona.file);
    updatePreview();
  } catch (err) {
    showError(err.message);
  }
}

async function selectRoleplay(roleplay, el) {
  $$('#roleplays-list .item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  state.selectedRoleplay = roleplay;
  try {
    state.roleplayContent = await loadMarkdown(roleplay.file);
    updatePreview();
  } catch (err) {
    showError(err.message);
  }
}

function extractPromptBlock(roleplayMd) {
  // Extracts the content inside the first ```...``` code block in the roleplay markdown
  const match = roleplayMd.match(/```[\w-]*\n([\s\S]*?)```/);
  return match ? match[1].trim() : roleplayMd;
}

function buildFinalPrompt() {
  if (!state.roleplayContent) return '';
  const promptTemplate = extractPromptBlock(state.roleplayContent);
  if (!state.personaContent) return promptTemplate;
  return promptTemplate.replace('[COLAR A PERSONA AQUI]', state.personaContent.trim());
}

function updatePreview() {
  const preview = $('#preview');
  const status = $('#status');
  const copyBtn = $('#btn-copy');

  let content = '';
  let canCopy = false;

  if (state.view === 'prompt') {
    if (!state.selectedPersona && !state.selectedRoleplay) {
      preview.innerHTML = `<div class="empty"><div class="icon">👈</div><div>Selecione uma <strong>persona</strong> e um <strong>roleplay</strong> para gerar o prompt.</div></div>`;
      status.textContent = '';
      copyBtn.disabled = true;
      return;
    }
    if (!state.selectedRoleplay) {
      preview.innerHTML = `<div class="empty"><div class="icon">🎬</div><div>Escolha um <strong>roleplay</strong> para montar o prompt.</div></div>`;
      status.textContent = `Persona: ${state.selectedPersona.name}`;
      copyBtn.disabled = true;
      return;
    }
    content = buildFinalPrompt();
    canCopy = true;
    const parts = [];
    if (state.selectedPersona) parts.push(`Persona: ${state.selectedPersona.name}`);
    parts.push(`Roleplay: ${state.selectedRoleplay.name}`);
    if (!state.selectedPersona) parts.push('(sem persona — placeholder não substituído)');
    status.textContent = parts.join(' · ');
  } else if (state.view === 'persona') {
    if (!state.selectedPersona) {
      preview.innerHTML = `<div class="empty"><div class="icon">👥</div><div>Selecione uma <strong>persona</strong>.</div></div>`;
      status.textContent = '';
      copyBtn.disabled = true;
      return;
    }
    content = state.personaContent;
    canCopy = true;
    status.textContent = state.selectedPersona.name;
  } else if (state.view === 'roleplay') {
    if (!state.selectedRoleplay) {
      preview.innerHTML = `<div class="empty"><div class="icon">🎬</div><div>Selecione um <strong>roleplay</strong>.</div></div>`;
      status.textContent = '';
      copyBtn.disabled = true;
      return;
    }
    content = state.roleplayContent;
    canCopy = true;
    status.textContent = state.selectedRoleplay.name;
  }

  if (state.renderMode === 'raw' || state.view === 'prompt') {
    preview.classList.add('raw');
    preview.classList.remove('rendered');
    preview.textContent = content;
  } else {
    preview.classList.remove('raw');
    preview.classList.add('rendered');
    preview.innerHTML = marked.parse(content);
  }

  copyBtn.disabled = !canCopy;
}

function showToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function showError(msg) {
  $('#preview').innerHTML = `<div class="empty" style="color: var(--danger);"><div class="icon">⚠️</div><div>${msg}</div></div>`;
}

function setupEvents() {
  $$('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      $$('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.view = tab.dataset.view;
      // Prompt view is always raw (it's a prompt to copy-paste)
      updateToggleVisibility();
      updatePreview();
    });
  });

  $('#btn-toggle-render').addEventListener('click', () => {
    state.renderMode = state.renderMode === 'rendered' ? 'raw' : 'rendered';
    $('#btn-toggle-render').textContent = state.renderMode === 'rendered' ? '📄 Cru' : '✨ Renderizado';
    updatePreview();
  });

  $('#btn-copy').addEventListener('click', async () => {
    let content = '';
    if (state.view === 'prompt') content = buildFinalPrompt();
    else if (state.view === 'persona') content = state.personaContent;
    else if (state.view === 'roleplay') content = state.roleplayContent;
    try {
      await navigator.clipboard.writeText(content);
      showToast('✓ Copiado para a área de transferência');
    } catch {
      showToast('Erro ao copiar');
    }
  });
}

function updateToggleVisibility() {
  // Toggle render only makes sense for persona/roleplay views
  const btn = $('#btn-toggle-render');
  if (state.view === 'prompt') {
    btn.style.display = 'none';
  } else {
    btn.style.display = '';
    btn.textContent = state.renderMode === 'rendered' ? '📄 Cru' : '✨ Renderizado';
  }
}

(async function init() {
  try {
    await loadManifest();
    renderPersonasList();
    renderRoleplaysList();
    setupEvents();
    updateToggleVisibility();
  } catch (err) {
    showError(err.message);
  }
})();
</script>
</body>
</html>
